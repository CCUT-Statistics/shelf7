<script>
var jform = $('#form');
var jsubmit = $('#submit');

$("#form").on('submit', function(){
        $("#form").reset();
        $("#submit").button('loading');
        var postdata = $("#form").serialize();
        console.log(postdata);
        $.xpost($("#form").attr('action'), postdata, function(code, message) {
              if(code == 0) {
                  $.alert(message);
                  $("#submit").text(message.a).delay(1000).button('reset');
                    //.location(referer);
                  return;
              } else {
                  $.alert(message);
                  $("#submit").button('reset');
              }
          });
      	return false;
    });

</script>
