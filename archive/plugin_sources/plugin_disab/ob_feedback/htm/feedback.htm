<div class="card-body ajax-body">

        <input name="to_uid" type="hidden" class="to_uid" value="0" />

        <input name="ob_thread_subject" class="ob_thread_subject" type="hidden" value="0" />
        <input name="ob_thread_url" class="ob_thread_url" type="hidden" value="0" />

        <div class="form-group row">
            <div class="col-12">
                <span>你觉得这个帖子有什么问题？</span>
            </div>
        </div>
        <div class="form-group row">
            <div class="col-12" style="flex: 1 0 50%;">
                <label class="custom-input custom-radio"><input type="radio" name="feedback" value="链接失效" checked="checked"> 链接失效</label>
            </div>
            <div class="col-12">
                <label class="custom-input custom-radio"><input type="radio" name="feedback" value="侵权投诉" checked="checked"> 侵权投诉</label>
            </div>
            <div class="col-12">
                <label class="custom-input custom-radio"><input type="radio" name="feedback" value="内容不符" checked="checked"> 内容不符</label>
            </div>

            </div>
        </div>

    </form>
</div>

<script ajax-eval="true">
    // 接受传参
    var args = args || {
        jmodal: null,
        callback: null,
        arg: null,
    };
    var jmodal = args.jmodal;
    var callback = args.callback;

    str = args.arg;
    var strs = new Array(); //定义一数组
    strs = str.split("[|]"); //字符分割

    $('.to_uid').val(strs[0]);
    $('.ob_thread_url').val(strs[1]);
    $('.ob_thread_subject').val(strs[2]);
    // $('.axinput').val(args.arg);



    var jform = $('#ob_form');
    var jsubmit = jform.find('button[type="submit"]');
    var jcancel = jform.find('button[type="button"]');

    jform.on('submit', function() {
        jform.reset();
        jsubmit.button('loading');
        var postdata = jform.serializeObject();
        $.xpost(jform.attr('action'), postdata, function(code, message) {
            if (code == 0) {
                jsubmit.button(message);
                setTimeout(function() {
                    if (jmodal) jmodal.modal('dispose');
                    if (callback) callback(message);
                    window.location.reload();
                }, 1000);
            } else {
                $.alert(message);
                jsubmit.button('reset');
            }
        });

        return false;
    });
    jcancel.on('click', function() {
        if (jmodal) jmodal.modal('dispose');
    });
</script>
