<script>
    $(function(){
        getDate();
    })
    
    $("#submit").on('click',function(){
        $("#submit").button('loading');
        let postdata = $("#form").serializeObject();
        postdata.op = 1 ;
        $.xpost($("#form").attr('action'),postdata,function(code,message){
            $.alert(message); 
            $("#submit").button('reset');
            getDate();
        });
    })
    
    function getDate(){
        let postdata = $("#form").serializeObject();
        postdata.op = 0 ;
        $.xpost($("#form").attr('action'),postdata,function(code,message){
            message.forEach((data,index)=>{
                $("#gc_"+data.gid).val(data.colour);
                $("#gf_"+data.gid).val(data.fcolour);
                $("#gz_"+data.gid).val(data.size);
            })
        })
    }
</script>
