<div class="card-body ajax-body">
	<form action="<?php echo url("private_letters");?>" method="post" id="cf_private_msgForm">
		<input name="to_uid" type="hidden"  class="cf_private_msg-id" value="0"  />
		<div class="form-group row">
			<div class="col-12">
					<textarea placeholder="<?php echo lang('private_letters_content');?>" name="cf_message" class="form-control" rows="6" ></textarea>
			</div>
		</div>
		<div class="form-group row">
			<div class="col-12">
				<button type="submit" class="button btn-block btn-primary axbutton" style="height:33.3px;" data-loading-text="<?php echo lang('sending');?>..." ><?php echo lang('send');?></button>
			</div>
		</div>
	</form>
</div>

<script ajax-eval="true">

// 接受传参
var args = args || {jmodal: null, callback: null, arg: null};
var jmodal = args.jmodal;
var callback = args.callback;

$('.cf_private_msg-id').val(args.arg);

var jform = $('#cf_private_msgForm');
var jsubmit = jform.find('button[type="submit"]');
var jcancel = jform.find('button[type="button"]');

jform.on('submit', function() {
    jform.reset();
    jsubmit.button('loading');
    var postdata = jform.serializeObject();
    $.xpost(jform.attr('action'), postdata, function(code, message) {
        if(code == 0) {
            jsubmit.button(message);
            setTimeout(function() {
                if(jmodal) jmodal.modal('dispose');
                if(callback) callback(message);
                window.location.reload();
            }, 1000);
        } else {
            $.alert(message);
            jsubmit.button('reset');
        }
    });
    
    return false;
});
jcancel.on('click', function() {
    if(jmodal) jmodal.modal('dispose');
});
    
</script>
