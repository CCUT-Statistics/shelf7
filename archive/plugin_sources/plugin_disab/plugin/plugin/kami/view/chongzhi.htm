<script>
	var jform = $('#form');
	var jsubmit = $('#submit');
	var jyouxiang = $('#youxiang');
	var jkahao = $('#kahao');
	var jkami = $('#kami');
	jform.on('submit', function() {
		jform.reset();
		jsubmit.button('loading');
		var postdata = jform.serializeObject();
		$.xpost(jform.attr('action'), postdata, function(code, message) {
			if(code == 0) {
				$.alert(message);
				jsubmit.button('reset');
			} else if(code == 'youxiang') {
				jyouxiang.alert(message).focus();
				jsubmit.button('reset');
			} else if(code == 'kahao') {
				jkahao.alert(message).focus();
				jsubmit.button('reset');
			} else if(code == 'kami') {
				jkami.alert(message).focus();
				jsubmit.button('reset');
			} else {
				$.alert(message);
				jsubmit.button('reset');
			}
		});
		return false;
	});
</script>
