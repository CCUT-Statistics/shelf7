<?php include _include(APP_PATH.'view/htm/footer.inc.htm');?>
<script>
	var jform = $('#form');
	var jsubmit = $('#submit');
	var jsend = $('#send');
	var jyouxiang = $('#youxiang');
	var jjine = $('#jine');
	var jyanzhengma = $('#yanzhengma');
	jsend.on('click', function() {
		jform.reset();
		jsend.button('loading');
		var postdata = jform.serialize();
		$.xpost(jsend.attr('action'), postdata, function(code, message) {
			if(code == 0) {
				$.alert(message);
				$('#verify_code').focus();
				var t = 60; // 倒计时
				jsend.button('<?php echo lang('
					user_send_sucessfully ');?> 60 ');
				jsubmit.button('reset');
				// 倒计时，重新发送
				var handler = setInterval(function() {
					jsend.button('<?php echo lang('
						user_send_sucessfully ');?> ' + (--t) + ' ');
					if(t == 0) {
						clearInterval(handler);
						jsend.button('reset');
					}
				}, 1000);
			} else if(code < 0) {
				$.alert(message);
				jsend.button('reset');
			} else {
				jform.find('[name="' + code + '"]').alert(message).focus();
				jsend.button('reset');
			}
		});
		return false;
	});
	jform.on('submit', function() {
		jform.reset();
		jsubmit.button('loading');
		var postdata = jform.serialize();
		$.xpost(jform.attr('action'), postdata, function(code, message) {
			if(code == 0) {
				$.alert(message);
				jsubmit.button('reset');
			} else if(code < 0) {
				$.alert(message);
				jsubmit.button('reset');
			} else {
				jform.find('[name="' + code + '"]').alert(message).focus();
				jsubmit.button('reset');
			}
		});
		return false;
	});
</script>
