<script>
var jform = $('#form');
var jsubmit = $('#submit');
jform.on('submit', function() {
    jform.reset();
    jsubmit.button('loading');
    var postdata = jform.serialize();
    $.xpost(jform.attr('action'), postdata, function(code, message) {
        if (code == 0) {
            jsubmit.button(message).delay(1000).button('reset').delay(500).location(xn.url('plugin-setting-huux_plugincenter'));
        } else if (xn.is_number(code)) {
            $.alert(message);
            jsubmit.button('reset');
        } else {
            jform.find('[name="' + code + '"]').alert(message).focus();
            jsubmit.button('reset');
        }
    });
    return false;
});

var jclear = $('#clear');
jclear.on('click', function() {
    $.xpost(xn.url('other-cache'), 'clear_tmp=1&clear_cache=1', function(code, message) {
        if (code == 0) {
            jclear.button(message).delay(1000).button('请等待刷新...').delay(500).location(xn.url('plugin-setting-huux_plugincenter'));
        } else {
            window.location.reload();
        }
    });
});
</script>
