version: "3.8"
services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ../../:/var/www/html:delegated
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks: [app]

  php:
    build:
      context: ./php
    volumes:
      - ../../:/var/www/html:delegated
    networks: [app]

  db:
    image: mariadb:10.6
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: xiuno
      MARIADB_USER: xiuno
      MARIADB_PASSWORD: xiuno
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks: [app]

volumes:
  db_data:

networks:
  app:
