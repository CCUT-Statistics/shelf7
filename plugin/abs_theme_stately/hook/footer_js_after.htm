<script id="scrolled_js">
    document.addEventListener('scroll', function () {
        var scrollTop = document.documentElement.scrollTop || document.body.scrollTop; // 已经读过被卷起来的文档部分
        var scrollHeight = document.documentElement.scrollHeight; // 文档总高度
        var clientHeight = document.documentElement.clientHeight; // 窗口可视高度
        if (scrollTop > 120) {
            document.body.classList.add('scrolled');
        } else {
            document.body.classList.remove('scrolled');
        }
        <?php if ($abs_theme_stately_setting['global']['settings']['show_read_progress']) : ?>
            if (document.getElementById('read-progress')) {
            document.getElementById('read-progress').style.width = +(scrollTop / (scrollHeight - clientHeight)).toFixed(2) * 100 + '%';
        }
        <?php endif; ?>
    });
    var befortop = 0;
    document.addEventListener("scroll", function () {
    var aftertop = document.documentElement ? document.documentElement.scrollTop : document.body.scrollTop;
    var scrollhide_navbar = document.querySelector('#layout-navbar');
    var scrollhide_appbar = document.querySelector('#layout-appbar');
    if (aftertop - befortop > 0) {
        <?php if($abs_theme_stately_setting['global']['settings']['hide_navbar_on_scroll']): ?>
        if (scrollhide_navbar) {
            scrollhide_navbar.classList.add('scrollhide');
            document.querySelector('.layout-page').classList.add('scrollhide');
        }
        <?php endif; ?>
        <?php if($abs_theme_stately_setting['global']['settings']['hide_appbar_on_scroll']): ?>
        if (scrollhide_appbar) {
            scrollhide_appbar.classList.add('scrollhide');
        }
        <?php endif; ?>
    } else {
        <?php if($abs_theme_stately_setting['global']['settings']['hide_navbar_on_scroll']): ?>
        if (scrollhide_navbar) {
            scrollhide_navbar.classList.remove('scrollhide');
            document.querySelector('.layout-page').classList.remove('scrollhide');
        }
        <?php endif; ?>
        <?php if($abs_theme_stately_setting['global']['settings']['hide_appbar_on_scroll']): ?>
        if (scrollhide_appbar) {
            scrollhide_appbar.classList.remove('scrollhide');
        }
        <?php endif; ?>
    }
    befortop = aftertop;
}, false);
</script>

<script id="threadlist_loadmore_js">
    document.getElementById('t_loadmore').addEventListener('click', function () {
        var button = this;
        button_spinner = button.querySelector('.spinner-border');
        button_spinner.removeAttribute('hidden');

        var nextHref = button.getAttribute('data-href');
        if (nextHref !== undefined) { //如果地址存在
            $.ajax({ //发起ajax请求
                url: nextHref, //请求的地址就是下一页的链接
                type: 'get',
                beforeSend: function (xhr) {
                    xhr.setRequestHeader('X-Requested-With', '');
                },
                error: function (xhr, status, error) {
                    console.warn('获取失败！' + status + ': ' + error);
                    window.location.href = nextHref;
                },
                success: function (response) {
                    button_spinner.setAttribute('hidden', 'hidden');

                    var new_res = $(response).find('.thread'); //挑出帖子数据
                    new_res.insertBefore($('.loadmore-container')); //将数据加载加进threadlist

                    if (typeof waterfall_container !== 'undefined') {

                        // 重新加载新添加的元素
                        waterfall_container.masonry('reloadItems');

                        // 重新排列所有元素
                        waterfall_container.masonry('layout');
                    }

                    var newNextHref = $(response).find('#t_loadmore').attr('data-href'); //找出新的下一页链接
                    if (newNextHref != undefined) {
                        $('#t_loadmore').attr('data-href', newNextHref);
                    } else {
                        $('#t_loadmore').attr('hidden', 'hidden'); //如果没有下一页了，隐藏按钮
                    }
                }
            });
        }
        return false;
    });
</script>
