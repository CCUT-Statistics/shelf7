            <h3 class="mt-3 h6 mr-2 mb-1"><i class="las la-clock text-primary"></i> 搜索历史 <button type="button" id="stately_fox_search_history_clear" class="border-0 badge bg-label-warning">清空</button></h3>
            <div id="fox_search_history_list"></div>
        </div>
        <script id="stately_fox_search_history_js">
            document.addEventListener('DOMContentLoaded', function () {
                document.getElementById('fox_search_form').addEventListener('submit', function (event) {

                    var keywordInput = this.querySelector('input[name=keyword]');
                    var keywordValue = keywordInput.value.trim();

                    if (keywordValue) {
                        // 更新搜索历史  
                        fox_updateSearchHistory(keywordValue);
                        // 显示搜索历史（如果尚未显示）  
                        fox_displaySearchHistory();
                    }
                });

                function fox_updateSearchHistory(keyword) {
                    var searchHistory = JSON.parse(localStorage.getItem('search_history')) || [];

                    // 如果搜索历史中不包含当前关键词，则添加到数组中  
                    if (!searchHistory.includes(keyword)) {
                        searchHistory.push(keyword);

                        // 限制搜索历史数量（可选）  
                        if (searchHistory.length > 10) {
                            searchHistory.shift(); // 移除最旧的搜索  
                        }

                        // 将更新后的搜索历史存储回localStorage  
                        localStorage.setItem('search_history', JSON.stringify(searchHistory));
                    }
                }

                function fox_displaySearchHistory() {
                    var historyList = document.getElementById('fox_search_history_list');
                    var searchHistory = JSON.parse(localStorage.getItem('search_history')) || [];

                    // 清空历史列表  
                    historyList.innerHTML = '';

                    // 显示搜索历史  
                    searchHistory.forEach(function (keyword) {
                        var link = document.createElement('a');
                        link.href = 'search.htm?keyword=' + encodeURIComponent(keyword); // 假设您想在URL中包含搜索关键词  
                        link.classList.add('badge');
                        link.classList.add('bg-label-secondary');
                        link.setAttribute('target', '_blank');

                        link.textContent = keyword;
                        historyList.appendChild(link);
                    });

                    // 显示清空按钮（如果历史不为空）  
                    var clearButton = document.getElementById('stately_fox_search_history_clear');
                    if (searchHistory.length > 0) {
                        clearButton.hidden = false;
                    } else {
                        clearButton.hidden = true;
                    }

                    // 添加清空搜索历史的点击事件  
                    clearButton.addEventListener('click', function () {
                        localStorage.removeItem('search_history');
                        fox_displaySearchHistory(); // 重新显示（现在是空的）  
                    });
                }

                // 首次加载页面时显示搜索历史  
                fox_displaySearchHistory();
            });

        </script>
