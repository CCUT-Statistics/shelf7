<script id="stately_cookie_dialog_js">

    if (document.cookie.indexOf('cookie_policy') === -1) {  
        document.getElementById('StatelyCookieDialog').removeAttribute('hidden');  
    } else {  
        document.getElementById('StatelyCookieDialog').setAttribute('hidden', 'true');  
    }  
  
    document.getElementById('cookie_accept').addEventListener('click', function () {  
        var expirationDate = new Date((new Date().getTime()) + 6 * 30 * 24 * 60 * 60 * 1000);

        document.cookie = 'cookie_policy=accept; expires=' + expirationDate.toUTCString() + '; path=/; domain=<?= $_SERVER["SERVER_NAME"]; ?>';  

        document.getElementById('StatelyCookieDialog').setAttribute('hidden', 'true');  
    });  
</script>
