            if (document.getElementById('statelyNotificationModalClearAllBtn') !== null) {

                document.getElementById('statelyNotificationModalClearAllBtn').addEventListener('click', function () {
                    var xhr = new XMLHttpRequest();
                    xhr.open('POST', "<?= url('my-notice') ?>?act=readall", true);
                    xhr.send();
                    xhr.onreadystatechange = function () {
                        if (xhr.readyState === XMLHttpRequest.DONE) {
                            if (xhr.status === 200) {
                                console.log(xhr.responseText);
                                document.querySelectorAll('#statelyNotificationModal .offcanvas-body ol li.notice').forEach(element => { element.remove(); });
                                if (document.querySelector('#statelyNotificationModalLabel .badge') !== null) {
                                    document.querySelector('#statelyNotificationModalLabel .badge').remove();
                                }
                                if (document.querySelector('.layout-navbar .nav-item[data-bs-target="#statelyNotificationModal"] .badge') !== null) {
                                    document.querySelector('.layout-navbar .nav-item[data-bs-target="#statelyNotificationModal"] .badge').remove();
                                }
                                if (document.querySelector('.layout-appbar .nav-item[data-bs-target="#statelyNotificationModal"] .badge') !== null) {
                                    document.querySelector('.layout-appbar .nav-item[data-bs-target="#statelyNotificationModal"] .badge').remove();
                                }
                                document.getElementById('statelyNotificationModalClearAllBtn').setAttribute('hidden', '');
                                if (document.querySelector('#statelyNotificationModal .btn-close') !== null) {
                                    document.querySelector('#statelyNotificationModal .btn-close').click();
                                }
                            } else {
                                document.getElementById('statelyNotificationModalClearAllBtn').setAttribute('hidden', '');
                                console.error('发生错误：' + xhr.status);
                            }
                        }
                    };
                });
            }
