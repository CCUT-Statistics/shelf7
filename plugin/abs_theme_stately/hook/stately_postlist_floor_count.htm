<!--{hook post_list_inc_floor_before.htm}-->
<?php if($_post['floor']) : ?>
<span class="floor-parent">
    <span class="floor">
        <?= $_post['floor'];?>
    </span>
    <?= lang('floor');?>

<?php if($_post['floor']) : ?>
