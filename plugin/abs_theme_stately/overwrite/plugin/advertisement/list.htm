<script>
var jform = $("#form");
var jsubmit = $("#submit");
var jconfirm = $("#confirm");
var juserlist = $('#advlist');
jform.on('submit', function(){
	jform.reset();
	var postdata = jform.serialize();
	jsubmit.button('loading');
	$.xpost(jform.attr('action'), postdata, function(code, message) {
		if(code == 0) {
			$.alert(message);
			jsubmit.text(message).delay(1000).location();
			return;
		} else {
			alert(message);
			jsubmit.button('reset');
		}
	});
	return false;
});

// 删除选中的用户
jconfirm.on('click', function(){
	var jchecked = juserlist.find('input[name="modtid"]').filter(function(){ return this.checked; });
	if(jchecked.length < 1) return alert("请勾选您要删除的广告");
	if(!window.confirm("确定删除广告？")) return false;
	jchecked.each(function() {
		jtr = $(this).parents('tr');
		var advid = jtr.attr('rowid');
		$.xpost(xn.url('plugin-setting-advertisement-delete'), {advid:advid}, function(code, message) {
			if(code != 0) return $.alert(message);
			jconfirm.text(message).delay(1000).location();
		});
	});
});
</script>
