function ax_get_comment_list() {
	$cachename = "ax_get_comment_list";
	$threadlist = cache_get($cachename);
	if($threadlist === NULL) {
		$threadlist = post_find( array( "isfirst" => 0, "quotepid" => 0 ), array( "create_date" => "-1" ), 1, 5 );
		cache_set($cachename, $threadlist, 600);
	}
	return $threadlist;
}
