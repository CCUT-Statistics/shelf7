		<script type="text/javascript">
			$(function () {
				var isclick = 0;
				num = 8;
				var shunxu = [0, 1, 2, 4, 7, 6, 5, 3];
				var prizes = document.getElementById('prizes');
				var list = prizes.getElementsByClassName('prize');
				$(".choujiang-btn").click(function () {
					var url = "<?php url('xzraffle-choujiang');?>";
					$.xpost(url, {}, function (code, message) {
						if (code == 0) {
							$.alert(message).delay(1000).location(xn.url('my-a_tjx'));
						} else {
							$.alert('哎呀，请稍后再试');
						}
					});
					if (isclick == 0) {
						startinit(num);
					}
				});

				//抽奖初始化
				function startinit(num) {
					var i = 0;  //定义一个i 用来计算抽奖跑动的总次数
					var t = 100;  //抽奖跑动的速度 初始为200毫秒
					var rounds = 3;  //抽奖转动的圈数
					var rNum = rounds * 8;  //标记跑动的次数（这是一个条件判断分界线）
					timer = setTimeout(startscroll, t);//每t毫秒执行startscroll函数
					//抽奖滚动的函数
					function startscroll() {
						//每次滚动抽奖将所有li的class都设为空
						for (var j = 0; j < list.length; j++) {
							list[j].className = 'prize';
						}
						var prizenum = shunxu[i % list.length];  //通过i余8得到此刻在prize数组中的数字，该数字就是mask标记出现的位置
						console.log(prizenum);
						if (prizenum == undefined) {
							return;
						}
						list[prizenum].className = "activecj prize ";
						i++;

						if (i < rNum - 8) {  //当i小于转(rNum-8次)的数量，t不变还是200毫秒
							timer = setTimeout(startscroll, t);//继续执行抽奖滚动
						} else if (i >= rNum - 8 && i < rNum + num) {
							//t时间变长，此时计时器运行速度降低，同时标签刷新速度也降低
							t += (i - rNum + 8) * 5;
							timer = setTimeout(startscroll, t);//继续执行抽奖滚动
						}
						if (i >= rNum + num) {//当i大于转rNum加随机数字num次计时器结束，出现提示框提示中奖信息
							console.log(num);
							// if (num==1) {
							//    message.innerHTML="恭喜你中了耳机";
							// }else if(num==2){
							//    message.innerHTML="恭喜你中了iPad";
							// }else if(num==3){
							//    message.innerHTML="感谢参与";
							// }else if(num==4){
							//    message.innerHTML="恭喜你中了洋娃娃";
							// }else if(num==5){
							//    message.innerHTML="恭喜你中了红色鞋子";
							// }else if(num==6){
							//    message.innerHTML="恭喜你中了白色手机";
							// }else if(num==7){
							//    message.innerHTML="恭喜你中了黑色手机";
							// }else if(num==8){
							//    message.innerHTML="恭喜你中了蓝色鞋子";
							// }

							var timer2 = null;
							timer2 = setTimeout(function () {
								// message.style.display="block";//奖品展示的信息为显示状态
								// span.style.background="#ee7a7b";
								clearTimeout(timer2);
							}, 1000);
							isclick = 1;//当计时器结束后让span标签变为抽奖状态
							clearTimeout(timer);
						}

					}
				}
