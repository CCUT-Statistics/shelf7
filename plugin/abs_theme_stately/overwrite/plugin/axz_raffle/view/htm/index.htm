		<script type="text/javascript">

			$(function () {
				var isclick = 0;
				var shunxu = [0, 1, 2, 4, 7, 6, 5, 3];
				var prizes = document.getElementById('prizes');
				var list = prizes.getElementsByClassName('prize');
				$(".choujiang-btn").click(function () {
					kaishichoujiang();
				});
				$(".cjmcj").click(function () {
					kaishichoujiang();
					$(".show_draw_code").attr('style', 'display: none');
				});
				function kaishichoujiang() {
					var url = "./<?php echo url('xzraffle-choujiang');?>";
					if (isclick == 0) {
						isclick = 1;
						$.post(url, { 'cjcode': $("#cjcode").val() }, function (data) {
							data = JSON.parse(data);
							console.log(data);
							if (data['code'] == 0) {
								startinit(data['datas']);
							} else {
								alert(data['message']);
								isclick = 0;
								if (data['code'] == -2) {
									$(".show_draw_code").attr('style', 'display: block');
								}
							}
						});

					}
				}

				//抽奖初始化
				function startinit(datas) {
					num = datas['zjnum'];
					var i = 0;  //定义一个i 用来计算抽奖跑动的总次数
					var t = 100;  //抽奖跑动的速度 初始为200毫秒
					var rounds = 3;  //抽奖转动的圈数
					var rNum = rounds * 8;  //标记跑动的次数（这是一个条件判断分界线）
					timer = setTimeout(startscroll, t);//每t毫秒执行startscroll函数
					//抽奖滚动的函数
					function startscroll() {
						//每次滚动抽奖将所有li的class都设为空
						for (var j = 0; j < list.length; j++) {
							list[j].className = 'prize';
						}
						var prizenum = shunxu[i % list.length];  //通过i余8得到此刻在prize数组中的数字，该数字就是mask标记出现的位置
						console.log(prizenum);
						if (prizenum == undefined) {
							return;
						}
						list[prizenum].className = "activecj prize ";
						i++;

						if (i < rNum - 8) {  //当i小于转(rNum-8次)的数量，t不变还是200毫秒
							timer = setTimeout(startscroll, t);//继续执行抽奖滚动
						} else if (i >= rNum - 8 && i < rNum + num) {
							//t时间变长，此时计时器运行速度降低，同时标签刷新速度也降低
							t += (i - rNum + 8) * 5;
							timer = setTimeout(startscroll, t);//继续执行抽奖滚动
						}
						if (i >= rNum + num) {//当i大于转rNum加随机数字num次计时器结束，出现提示框提示中奖信息
							console.log(num);
							$("#czimg").attr('src', datas['jpimg']);
							$("#cztxt").html(datas['jpname']);
							$(".apply_dialog").attr('style', 'display: block');
							var timer2 = null;
							timer2 = setTimeout(function () {
								clearTimeout(timer2);
							}, 1000);
							isclick = 0;//当计时器结束后让span标签变为抽奖状态
							clearTimeout(timer);
						}

					}
				}
				$(".cancle").click(function () {
					$(".show_draw_code").attr('style', 'display: none');
					$(".apply_dialog").attr('style', 'display: none');
				});
			})

		</script>
	</body>
