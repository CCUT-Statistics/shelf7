<script ajax-eval="true">

// 接受传参
var args = args || {jmodal: null, callback: null, arg: null};
var jmodal = args.jmodal;
var callback = args.callback;
var arg = args.arg;
var jthreadlist = $(arg);  // .threadlist
var tidarr = jthreadlist.find('input:radio[name="invite_buy"]:checked').val();
var typearr = jthreadlist.find('input:radio[name="invite_buy"]:checked')[0].nextSibling.nodeValue;
var jform = $('#user_paidinvitecode_form');
var jsubmit = jform.find('button[type="submit"]');
var jtotal = jform.find('span.img');
var jtypearr = jform.find('span.typearr');
jtotal.html('<img src="plugin/buy_invite_code/view/img/'+ tidarr +'.png">');
jtypearr.html(typearr);

jform.on('submit', function() {
	jform.reset();
	jsubmit.button('loading');
	var postdata = jform.serializeObject();
	postdata.tidarr = tidarr;
	$.xpost(jform.attr('action'), postdata, function(code, message) {
		if(code == 0) {
			jsubmit.button(message);
			setTimeout(function() {
				if(jmodal) jmodal.modal('dispose');
				if(callback) callback(message);
				window.location.reload();
			}, 1000);
		} else {
			$.alert(message);
            jsubmit.button('reset');
		}
	});
	return false;
});
	
</script>
