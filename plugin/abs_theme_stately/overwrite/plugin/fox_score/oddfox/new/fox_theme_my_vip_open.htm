<script ajax-eval="true">
  let jinput = $("#jnum"),
    jform = $("#form"),
    jbutton = $("#jbutton"),
    jgrow = $("#jgrow"),
    pay_T = 'month',
    jpay = $("#jpay"),
    credit_name = "<?php echo fox_score_code_fmt('{exp'.$conf['vip_price_type'].'}') ?>",
    month_num = "<?php echo $conf['vip_price_m'];?>",
    season_num = "<?php echo $conf['vip_price_q'];?>",
    half_year_num = "<?php echo $conf['vip_price_h'];?>",
    year_num = "<?php echo $conf['vip_price_y'];?>",
    forever_num = "<?php echo $conf['vip_price_f'];?>",
    credit_type = "<?php echo $conf['vip_price_type'];?>",
    month_grow = "<?php echo $conf['vip_gift_m'];?>",
    season_grow = "<?php echo $conf['vip_gift_q'];?>",
    half_year_grow = "<?php echo $conf['vip_gift_h'];?>",
    year_grow = "<?php echo $conf['vip_gift_y'];?>",
    forever_grow = "<?php echo $conf['vip_gift_f'];?>";
  jinput.keyup(function () {
    $(this).val($(this).val().replace(/[^0-9]/g, '')); count_cost();
  }).bind("paste", function () {
    $(this).val($(this).val().replace(/[^0-9]/g, '')); count_cost();
  }).css("ime-mode", "disabled").blur(function () {
    $(this).val($(this).val().replace(/[^0-9]/g, '')); count_cost();
  });
  jbutton.on('click', function () {
    if (jinput.val() == '0') return;
    if (confirm('您确定要充值VIP吗?')) {
      jbutton.button('loading');
      var postdata = jform.serialize(); jform.reset();
      $.xpost(jform.attr('action'), postdata, function (code, message) {
        if (code == 0) {
          $.alert(message);
          setTimeout(() => { location.reload(); }, 1500)
        }
        else $.alert(message);
        jbutton.button('reset');
      });
    }
  });
  $("#buy_month").on('click', function () { set_payT('month'); });
  $("#buy_season").on('click', function () { set_payT('season'); });
  $("#buy_half_year").on('click', function () { set_payT('half_year'); });
  $("#buy_year").on('click', function () { set_payT('year'); });
  $("#buy_forever").on('click', function () { set_payT('forever'); });
  count_cost();
  function count_cost () {
    var num = jinput.val();
    var jpay_num = credit_name + ' '; var jgrow_num = 0;
    switch (pay_T) {
      case 'month':
        jpay_num += parseInt(month_num) * parseInt(num); jgrow_num = parseInt(month_grow) * parseInt(num); break;
      case 'season':
        jpay_num += parseInt(season_num) * parseInt(num); jgrow_num = parseInt(season_grow) * parseInt(num); break;
      case 'half_year':
        jpay_num += parseInt(half_year_num) * parseInt(num); jgrow_num = parseInt(half_year_grow) * parseInt(num); break;
      case 'year':
        jpay_num += parseInt(year_num) * parseInt(num); jgrow_num = parseInt(year_grow) * parseInt(num); break;
      case 'forever':
        jpay_num += parseInt(forever_num) * parseInt(num); jgrow_num = parseInt(forever_grow) * parseInt(num); break;
      default:
        jpay_num += parseInt(month_num) * parseInt(num); jgrow_num = parseInt(month_grow) * parseInt(num); break;
    }
    jpay.val(jpay_num);
    jgrow.val(jgrow_num);
  }
  function set_payT (T) {
    pay_T = T;
    count_cost();
  }
</script>
