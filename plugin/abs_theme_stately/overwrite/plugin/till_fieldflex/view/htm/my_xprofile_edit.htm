<template include="./plugin/abs_theme_stately/overwrite/view/htm/my.template.htm">
	<slot name="my_body">
		<div class="d-flex justify-content-between align-items-center mb-2">
			<h3 class="h5 m-0"><?= lang('my_extra_profile_edit') ?></h3>
			<a href="<?= url('my-xprofile') ?>" class="btn btn-outline-secondary"><?= lang('back') ?></a>
		</div>
		<form action="<?= url('my-xprofile-edit') ?>" method="post" id="custom_field_form">
			<?= fieldflex_generate_form_html($user_fieldflex_fields,$my_custom_field_data) ?>
			<footer>
				<button type="submit" class="btn btn-primary btn-block"><?= lang('save') ?></button>
			</footer>
		</form>

	</slot>
</template>
<script>
	$('a[data-active="my-xprofile"]').addClass('active');
</script>


<script>

	var jform = $("#custom_field_form");
	var jsubmit = $("#submit");
	var referer = '<?php echo http_referer();?>';
	jform.on('submit', function () {
		jform.reset();
		jsubmit.button('loading');
		var postdata = jform.serialize();
		$.xpost(jform.attr('action'), postdata, function (code, message) {
			if (code == 0) {
				$.alert(message);
				jsubmit.text(message).delay(2000).button('reset');
				window.location.replace(referer);
				return;
			}else if(xn.is_number(code)) {
				alert(message);
				jsubmit.button('reset');
			} else {
				jform.find('[name="'+code+'"]').alert(message).focus();
				jsubmit.button('reset');
			}
		});
		return false;
	});

</script>
