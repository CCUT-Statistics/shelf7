<script>
	$('a[data-active="my-medal"]').addClass('active');

<script>
	var mid = ""
	var applyTrue = $("#applyTrue");
	var AMform = $("#AMform");
	function buy_medal(mid) {
		$.confirm('您确定要购买该<?= lang("medal") ?>吗？', function () {
			var postdata = "mid=" + mid;
			$.xpost(xn.url('my-medal'), postdata, function (code, message) {
				$.alert(message);
				if (code == 0)
					setInterval(function () {
						location.reload();
					}, 2000);
			});
		});
	}
	function click_apply(id, name) {
		mid = id;
		$('#apply_headLable').text("申请<?= lang('medal') ?>-" + name);
	}
	applyTrue.on('click', function () {
		if ($("#txt_reason").val() === "") {
			$.alert("申请理由不能为空");
			$('#applyModal').modal("hide");
			return;
		}
		var postdata = { "mid": mid, "reason": $("#txt_reason").val() }
		$.xpost(xn.url('my-medal_apply'), postdata, function (code, message) {
			$.alert(message);
			$('#applyModal').modal("hide");
			if (code == 0)
				setInterval(function () {
					location.reload();
				}, 2000);
		})
	});
	$('#applyModal').on('hide.bs.modal', function () {
		$("#txt_reason").val("");
	});
</script>
