<script>
	function iskill(mid) {
		$.confirm("您确定要销毁吗？确定后无法恢复且返还<?= setting_get('tt_medal')['proportion']*10 ?>%原价(向上取整)", function () {
			var postdata = "mid=" + mid;
			$.xpost(xn.url('my-medal_my'), postdata, function (code, message) {
				$.alert(message);
				if (code == 0)
					setInterval(function () {
						location.reload();
					}, 2000);
			});
		});
	}	
</script>
