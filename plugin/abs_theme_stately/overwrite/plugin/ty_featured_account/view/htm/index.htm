<?php include _include(APP_PATH.'view/htm/footer.inc.htm');?>
<script ajax-eval="true">

    $(".buy_account").on('click', function () {
        changeAmount();
    });

    $('#jnum').bind('input propertychange', function () {
        changeAmount();
    })

    $(function () {
        changeAmount();
    });

    function changeAmount() {
        var pay_amount = $('input[name="buy_type"]:checked').attr('pay_amount');
        var num = $('#jnum').val();
        $('#jpay').val(parseInt(pay_amount) * parseInt(num));
    }
    var jinput = $("#jnum");
    var jform = $("#form");
    var jbutton = $("#jbutton");
    jbutton.on('click', function () {
        if (jinput.val() == '0') return;
        if (confirm('您确定要购买吗?')) {
            jbutton.button('loading');
            var postdata = jform.serialize();
            var id = $('input[name="buy_type"]:checked').val();
            postdata += ('&id=' + id)
            jform.reset();
            $.xpost(jform.attr('action'), postdata, function (code, message) {
                if (code == 0) location.reload();
                else $.alert(message);
                jbutton.button('reset');
            });
        }
    });

</script>
