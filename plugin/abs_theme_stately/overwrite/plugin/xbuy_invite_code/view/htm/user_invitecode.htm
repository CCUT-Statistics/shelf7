<script>
	$('a[data-active="user-invitecode"]').addClass('active');
	var jsearch = $("#search");
	jsearch.on('click', function () {
		var keyword = $("#keyword").val();
		if (keyword) {
			if (xn.is_email(keyword)) {
				var url = xn.url('user-invitecode') + "?kwd=" + xn.urlencode(keyword);
				window.location = url;
			} else {
				$.alert('邮箱格式错误');
			}
		} else {
			$.alert('请输入邮箱');
		}
	});
	$('tbody tr td .syn').on('click', function () {
		var jsyn = $("#syn");
		var order = $(this).data('order');
		var postdata = { order: order };
		$.confirm('确认同步该笔订单？', function () {
			$.xpost(xn.url('user-syn'), postdata, function (code, message) {
				if (code == 0) {
					$.alert(message);
					jsyn.delay(1000).location();
				} else if (xn.is_number(code)) {
					$.alert(message);
					jsyn.button('reset');
				} else {
					jform.find('[name="' + code + '"]').alert(message).focus();
					jsyn.button('reset');
				}
			});
			return false;
		});
	});
	$(function () {
		$('[data-toggle="tooltip"]').tooltip()
	})
</script>
