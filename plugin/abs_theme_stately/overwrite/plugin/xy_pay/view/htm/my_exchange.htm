<script>
var jform1 = $('#form1');
var jsubmit1 = $('#submit1');
jform1.on('submit', function() {
	jform1.reset();
	jsubmit1.button('loading');
	var postdata = jform1.serializeObject();
	$.xpost(jform1.attr('action'), postdata, function(code, message) {
		if(code == 0) {
			$.alert(message);
			jsubmit1.button(message).delay(3000).button('reset');
		} else if(xn.is_number(code)) {
			alert(message);
			jsubmit1.button('reset');
		} else {
			jform1.find('[name="'+code+'"]').alert(message).focus();
			jsubmit1.button('reset');
		}
	});
	return false;
});
