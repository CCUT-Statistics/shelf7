<script>
$(function(){
	$(':input').labelauty();
});
function is_mobile() {
	var sUserAgent = navigator.userAgent.toLowerCase();
	return (
		sUserAgent.match(/ipad/i) == "ipad" ||
		sUserAgent.match(/iphone os/i) == "iphone os" ||
		sUserAgent.match(/midp/i) == "midp" ||
		sUserAgent.match(/rv:1.2.3.4/i) == "rv:1.2.3.4" ||
		sUserAgent.match(/ucweb/i) == "ucweb" ||
		sUserAgent.match(/android/i) == "android" ||
		sUserAgent.match(/windows ce/i) == "windows ce" ||
		sUserAgent.match(/windows mobile/i) == "windows mobile"
	);
}
function is_weixn(){  
	var ua = navigator.userAgent.toLowerCase();  
	if(ua.match(/MicroMessenger/i)=="micromessenger") {  
		return true;  
	} else {  
		return false;  
	}  
} 

<?php if($conf['pay_type']){?>
$("#submit").click(function(){
var pid = $("input[name='paytype']:checked").val();
	if(pid == 3 && is_mobile() == false){
  $("#payframe").show();
  }else{
  $("#payframe").hide();
  }
});

function check_client(){
var pid = $("input[name='paytype']:checked").val();
var mobile = is_mobile();
	if(pid == 1){
			$("#payform").attr("target","_blank");
	}else if(pid==2){
		if(mobile){
			$("#payform").attr("target","payframe");
		}else{
			$("#payform").attr("target","_blank");
		}
	}else if(pid==3){
		if(mobile){
				$("#payform").attr("target","_blank");
		}else{
			$("#payform").attr("target","payframe");
		}
	}
}
check_client();
<?php }?>
