/* 计算缓存命中率 */
function calculateCacheHitRate (db_counter) {
    let cacheHits = db_counter.DELETE_CACHE + db_counter.INSERT_CACHE + db_counter.SELECT_CACHE + db_counter.UPDATE_CACHE;
    let totalQueries = db_counter.DELETE + db_counter.DELETE_CACHE + db_counter.INSERT + db_counter.INSERT_CACHE + db_counter.SELECT + db_counter.SELECT_CACHE + db_counter.UPDATE + db_counter.UPDATE_CACHE;
    return cacheHits / totalQueries;
  };
