<script>
	var jform = $('#form');
	var jsubmit = $('#submit');
	jform.on('submit', function () {
		jform.reset();
		jsubmit.button('loading');
		var postdata = jform.serializeObject();
		postdata.password_old = $.md5(postdata.password_old);
		postdata.password_new = $.md5(postdata.password_new);
		postdata.password_new_repeat = $.md5(postdata.password_new_repeat);
		$.xpost(jform.attr('action'), postdata, function (code, message) {
			if (code == 0) {
				$.toast({
					title: lang.tips_title,
					content: message,
					type: 'success',
					pause_on_hover: true,
					delay: 5000
				});
				jsubmit.button(message).delay(3000).button('reset');
			} else if (xn.is_number(code)) {

				$.toast({
					title: lang.tips_title,
					content: message,
					type: 'warning',
					pause_on_hover: true,
					delay: 5000
				});
				jsubmit.button('reset');
			} else {
				jform.find('[name="' + code + '"]').alert(message).focus();
				jsubmit.button('reset');
			}
		});
		return false;
	});
</script>
