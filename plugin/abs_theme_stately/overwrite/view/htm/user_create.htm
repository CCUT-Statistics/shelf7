<script src="<?= $conf['view_url'];?>js/md5.js"></script>
<script id="register_js">
	var jform = $('#form');
	var jsubmit = $('#submit');
	var jsend = $('#sendcode');
	var referer = '<?= http_referer(); ?>';
	jsend.on('click', function () {
		jform.reset();
		jsend.button('loading');
		var postdata = jform.serialize();
		$.xpost(jsend.attr('action'), postdata, function (code, message) {
			if (code == 0) {
				$('#code').focus();
				var t = 60; // 倒计时
				jsend.button('<?= lang('user_send_sucessfully');?> 60 ');
				jsubmit.button('reset');
				// 倒计时，重新发送
				var handler = setInterval(function () {
					jsend.button('<?= lang('user_send_sucessfully');?> ' + (--t) + ' ');
					if (t == 0) {
						clearInterval(handler);
						jsend.button('reset');
					}
				}, 1000);
			} else if (code < 0) {
				$.alert(message, -1);
				jsend.button('reset');
			} else {
				jform.find('[name="' + code + '"]').alert(message).focus();
				jsend.button('reset');
			}
		});
		return false;
	});

	jform.on('submit', function () {
		var postdata = jform.serializeObject();
		jsubmit.button('loading');
		postdata.password = $.md5(postdata.password);
		if (document.getElementById('terms_confirmed') !== null && !document.getElementById('terms_confirmed').checked) {

				jform.find('[name="terms_confirmed"]').alert("请确保您阅读了网站规则").focus();
				jsubmit.button('reset');
				return false;
			
		}
		$.xpost(jform.attr('action'), postdata, function (code, message) {
			if (code == 0) {
				jsubmit.button(message).delay(1000).location(referer);
			} else if (xn.is_number(code)) {
				alert(message);
				jsubmit.button('reset');
			} else {
				jform.find('[name="' + code + '"]').alert(message).focus();
				jsubmit.button('reset');
			}
		});
		return false;
	});

</script>
<!--{hook user_create_js.htm}-->
