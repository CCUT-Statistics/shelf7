<script src="<?= $conf['view_url'];?>js/md5.js"></script>
<script id="login_js">
	var jform = $('#form');
	var jsubmit = $('#submit');
	var jemail = $('#email');
	var jpassword = $('#password');
	var referer = '<?= $referer;?>';
	jform.on('submit', function () {
		jform.reset();
		jsubmit.button('loading');
		//var postdata = jform.serializeObject(); /* serializeObject不再可靠 */
		var formData = jform.serializeArray();  /* jQuery自带函数 */
		var postdata = {};
		$.each(formData, function() {  
			if (this.name === 'password') {
				postdata[this.name] = $.md5(this.value);  
			} else {
				postdata[this.name] = this.value;  
			}
		});  
		$.xpost(jform.attr('action'), postdata, function (code, message) {
			if (code == 0) {
				jsubmit.button(message).delay(1000).location(referer);
			} else if (xn.is_number(code)) {
				alert(message);
				jsubmit.button('reset');
			} else {
				jform.find('[name="' + code + '"]').alert(message).focus();
				jsubmit.button('reset');
			}
			/*
			if(code == 0) {
				jsubmit.button(message).delay(1000).location(referer);
			} else if(code == 'email') {
				jemail.alert(message).focus();
				jsubmit.button('reset');
			} else if(code == 'password') {
				jpassword.alert(message).focus();
				jsubmit.button('reset');
			} else {
				alert(message);
				jsubmit.button('reset');
			}*/
		});
		return false;
	});

</script>
