	<script id="abs_menu">

		$('#nav li.nav-item-menus').addClass('active');

		var maxid = <?= $maxid;?>; //当前最大ID

		var jform = $("#form");
		var jsubmit = $("#submit");
		var jarrlist = $('#arrlist');
		//jform.base64_encode_file(); // 对文件进行 base64 编码，处理文件上传，很方便

		//提交
		jform.on('submit', function () {
			jform.reset();
			var postdata = jform.serialize();
			jsubmit.button('loading');
			$.xpost(jform.attr('action'), postdata, function (code, message) {
				if (code == 0) {
					alert(message);
					jsubmit.text(message).location();
					return;
				} else {
					alert(message);
					jsubmit.button('reset');
				}
			});
			return false;
		});

		// 删除
		var jdelete = $('a.row_delete');
		jarrlist.on('click', 'a.row_delete', function () {
			var jthis = $(this);
			var jtr = jthis.parents('tr');
			var rowid = jtr.attr('rowid');
			if (jform.find('tbody').find('tr').length <= 2) {
				$.alert('请保留至少一个菜单项！');
				return;
			}
			jtr.remove();
			return false;
		});
		// 增加
		var jadd = $('a.row_add');
		jadd.on('click', function () {

			var jclone = jarrlist.find('tr').last().clone(); //复制模板
			jclone.insertAfter(jarrlist.find('tr').last()).removeClass('d-none'); //粘贴到最后一项

			var jrowid = jclone.find('input[name^="lid"]');
			var rowid = ++maxid - 1;
			jrowid.val(rowid); //填写ID
			jclone.attr('rowid', rowid);

			// 清空其他框的值
			jclone.find('input').not('[name^="lid"]').val('');

			// 修改 name="xxx[]" 中的值为 rowid
			jclone.find('input').attr_name_index(rowid);

			return false;
		});

	</script>
