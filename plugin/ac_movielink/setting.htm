<script>
    var maxid = <?= $maxid? $maxid : 0?>;

    $(document).ready(function () {
        $('#form').on('submit', function (e) {
            e.preventDefault();
            var postdata = $(this).serialize();
            $('#submit').button('loading');
            $.ajax({
                type: 'POST',
                url: $(this).attr('action'),
                data: postdata,
                success: function (response) {
                    if (response.code === 0) {
                        $.alert(response.message);
                        $('#submit').text(response.message).delay(3000).location();
                        return;
                    } else {
                        alert(response.message);
                        $('#submit').button('reset');
                    }
                },
                error: function (error) {
                    console.error('Error submitting form:', error);
                    alert('An error occurred while submitting the form.');
                    $('#submit').button('reset');
                }
            });
            return false;
        });

        $('.arrlist').on('click', 'a.row_delete', function () {
            var jthis = $(this);
            var jtr = jthis.parents('tr');
            var rowid = jtr.attr('rowid');
            if ($('tbody tr').length <= 2) {
                $.alert('不能删除系统保留的版块。');
                return false;
            }
            jtr.remove();
        });

        // 添加调试输出
        $('.row_add').on('click', function () {
            console.log('点击了增加一行按钮');
            var jclone = $('.arrlist').find('tr').last().clone();
            jclone.insertAfter($('.arrlist').find('tr').last()).removeClass('d-none');
            var jrowid = jclone.find('input[name^="rowid"]');
            var rowid = ++maxid;
            jrowid.val(rowid);
            jclone.attr('rowid', rowid);
            jclone.find('input').not('[name^="rowid"]').val('');
            jclone.find('select.start-time, select.end-time').html('');
            for ($h = 0; $h < 24; $h++) {
                for ($m = 0; $m < 60; $m += 15) {
                    jclone.find('select.start-time').append('<option value="<?= sprintf('%02d:%02d', $h, $m);?>"><?= sprintf('%02d:%02d', $h, $m);?></option>');
                    jclone.find('select.end-time').append('<option value="<?= sprintf('%02d:%02d', $h, $m);?>"><?= sprintf('%02d:%02d', $h, $m);?></option>');
                }
            }
            return false;
        });

        $('#nav_pc li.plugin, #nav_mobile li.plugin').addClass('active');

        $('#weekTabs a.nav-link').on('click', function () {
            var selectedDay = $(this).text();
            $('input[name^="nametype"]').val(selectedDay);
            $('#weekTabs a.nav-link').removeClass('active');
            $(this).addClass('active');
        
            // 显示对应的数据
            var dayData = selectedDay === '周一'? '1' : selectedDay === '周二'? '2' : selectedDay === '周三'? '3' : selectedDay === '周四'? '4' : selectedDay === '周五'? '5' : selectedDay === '周六'? '6' : '7';
            $('#dataBody tr').hide();
            $('#dataBody tr[data-day="' + dayData + '"]').show();
        
            // 重新绑定添加按钮的点击事件
            $('.row_add').off('click').on('click', function () {
                   console.log('点击了增加一行按钮');
                var jclone = $('.arrlist').find('tr').last().clone();
                console.log('克隆的元素：', jclone);
                jclone.insertAfter($('.arrlist').find('tr').last()).removeClass('d-none');
                console.log('插入后的表格体元素：', $('#dataBody'));
                var jrowid = jclone.find('input[name^="rowid"]');
                var rowid = ++maxid;
                jrowid.val(rowid);
                jclone.attr('rowid', rowid);
                jclone.find('input').not('[name^="rowid"]').val('');
                jclone.find('select.start-time, select.end-time').html('');
                for ($h = 0; $h < 24; $h++) {
                    for ($m = 0; $m < 60; $m += 15) {
                        jclone.find('select.start-time').append('<option value="<?= sprintf('%02d:%02d', $h, $m);?>"><?= sprintf('%02d:%02d', $h, $m);?></option>');
                        jclone.find('select.end-time').append('<option value="<?= sprintf('%02d:%02d', $h, $m);?>"><?= sprintf('%02d:%02d', $h, $m);?></option>');
                    }
                }
                return false;
            });
        });
    });
</script>
