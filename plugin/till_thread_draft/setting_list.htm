<script>
$("[data-toggle='tooltip']").tooltip();

function draft_delete(uid, slot) {
    $.xpost(xn.url('plugin-setting-till_thread_draft-delete'), {
        uid: uid,
        slot: [slot]
    }, function(code, message) {
        if (code == 0) {
            $.alert(message).delay(2000).location();
            return;
        } else {
            $.alert(message);
        }
    });
}
</script>
