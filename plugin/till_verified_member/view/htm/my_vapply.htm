<script>
    var jform = $('#v_apply_form');
    var jsubmit = $('#submit');
    jform.on('submit', function () {
        jform.reset();
        jsubmit.button('loading');
        var postdata = jform.serializeObject();
        postdata.username_new = postdata.username_new;
        $.xpost(jform.attr('action'), postdata, function (code, message) {
            if (code == 0) {
                $.alert(message);
                jsubmit.button('reset');
                setTimeout(function () { location.reload(); }, 3000);
            } else if (code < 0) {
                $.alert(message);
                jsubmit.button('reset');
            } else {
                jform.find('[name="' + code + '"]').alert(message).focus();
                jsubmit.button('reset');
            }
        });
        return false;
    });

    $('a[data-active="my-vapply"]').addClass('active');

    var javatar_upload = $('#v_file_upload');
    var jprogress = $('#v_file_progress');
    var jimg = $('#v_file');
    jprogress.hide();
    javatar_upload.on('change', function (e) {
        var files = xn.get_files_from_event(e);
        xn.upload_file(
            files[0],
            xn.url('my-v_upload'), {},
            function (code, message) {
                if (code == 0) {
                    //jimg.attr('src', message.src + '?' + Math.random());
                    jimg.val(message.src + '?' + Math.random());
                    $("label[for='v_file_upload'].custom-file-label").text(message.msg);
                    //$.alert(message.msg);
                    jprogress.delay(1000).hide();
                } else {
                    $.alert(message);
                }
            },
            function (percent) {
                jprogress.show();
                jprogress.width(percent + '%');
            }
        );
    });
</script>
